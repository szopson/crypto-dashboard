version: "3.8"

services:
  backend:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: tcc-backend
    restart: always
    env_file:
      - ./engine/.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      # Daily cockpit digest: draft post to the Telegram admin chat at 09:00
      # Europe/Warsaw. Fetches the snapshot over the docker network; the public
      # URL only appears in the post's CTA link.
      - COCKPIT_DIGEST_ENABLED=true
      - FRONTEND_BASE_URL=https://follio.io
      - FRONTEND_INTERNAL_URL=http://frontend:3000
      # Supabase project URL (public value) — required for ES256 JWT
      # verification via JWKS in middleware/auth.py. Pinned here because the
      # VPS engine/.env drifts (observed 2026-07-10: missing SUPABASE_URL broke
      # wealth auth with "Unable to verify token signature"); real environment
      # variables take precedence over env_file for pydantic settings.
      - SUPABASE_URL=https://wkyssmlitsxgvslcyedf.supabase.co
    volumes:
      # Daily digest + opportunity-card state (engine writes ./data/*.json);
      # a named volume so the state survives container recreates on deploy.
      - tcc-backend-data:/app/data
      # GeoLite2 DB maintained by the geoip service; read-only. Missing file
      # is a supported degraded mode (/api/region returns null → fail-closed).
      - tcc-geoip:/geoip:ro
    networks:
      - traefik-public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.tcc-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.tcc-api.tls=true
      - traefik.http.routers.tcc-api.entrypoints=websecure
      - traefik.http.routers.tcc-api.tls.certresolver=mytlschallenge
      - traefik.http.routers.tcc-api.priority=2
      - traefik.http.services.tcc-api.loadbalancer.server.port=8000
      - traefik.http.middlewares.tcc-api.headers.SSLRedirect=true
      - traefik.http.middlewares.tcc-api.headers.STSSeconds=315360000
      - traefik.http.middlewares.tcc-api.headers.browserXSSFilter=true
      - traefik.http.middlewares.tcc-api.headers.contentTypeNosniff=true
      - traefik.http.routers.tcc-api.middlewares=tcc-api@docker

  # Keeps GeoLite2-Country fresh for the backend's /api/region (GeoLite EULA
  # requires data ≤30 days old). Backend does NOT depend on this service —
  # without credentials or DB it degrades to region=null. Credentials are
  # upserted into engine/.env by the deploy workflow (GEOIPUPDATE_* keys).
  geoip:
    image: ghcr.io/maxmind/geoipupdate:v7.1
    container_name: tcc-geoip
    # on-failure (not always): without credentials the container exits
    # non-zero and must not crash-loop forever next to healthy services.
    restart: on-failure:5
    environment:
      - GEOIPUPDATE_ACCOUNT_ID=${GEOIPUPDATE_ACCOUNT_ID}
      - GEOIPUPDATE_LICENSE_KEY=${GEOIPUPDATE_LICENSE_KEY}
      - GEOIPUPDATE_EDITION_IDS=GeoLite2-Country
      - GEOIPUPDATE_FREQUENCY=72
    volumes:
      - tcc-geoip:/usr/share/GeoIP
    networks:
      - traefik-public
    healthcheck:
      test: ["CMD", "test", "-s", "/usr/share/GeoIP/GeoLite2-Country.mmdb"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://${DOMAIN}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
        - NEXT_PUBLIC_POSTHOG_KEY=${NEXT_PUBLIC_POSTHOG_KEY}
        - NEXT_PUBLIC_POSTHOG_HOST=${NEXT_PUBLIC_POSTHOG_HOST:-https://eu.i.posthog.com}
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://follio.io}
    container_name: tcc-frontend
    restart: always
    environment:
      - BACKEND_URL=http://backend:8000
      # Server-side only (never NEXT_PUBLIC): read at request time by the
      # cockpit / crypto-pulse route (Coinglass, Velo) and the trade-review
      # route (Anthropic). Coinglass/Velo come from GitHub secrets; the
      # Anthropic key is sourced from engine/.env by the deploy workflow.
      - COINGLASS_API_KEY=${COINGLASS_API_KEY}
      - VELO_API_KEY=${VELO_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.http.routers.tcc.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.tcc.tls=true
      - traefik.http.routers.tcc.entrypoints=websecure
      - traefik.http.routers.tcc.tls.certresolver=mytlschallenge
      - traefik.http.routers.tcc.priority=1
      - traefik.http.services.tcc.loadbalancer.server.port=3000
      # Next.js API routes must beat the backend's PathPrefix(`/api`) rule
      # (priority 2), otherwise Traefik sends them to FastAPI and they 404.
      # Keep this list in sync with routes under frontend/src/app/api/.
      - traefik.http.routers.tcc-next-api.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api/crypto-pulse`) || PathPrefix(`/api/trade-review`) || PathPrefix(`/api/ai-setup`))
      - traefik.http.routers.tcc-next-api.priority=10
      - traefik.http.routers.tcc-next-api.entrypoints=websecure
      - traefik.http.routers.tcc-next-api.tls=true
      - traefik.http.routers.tcc-next-api.tls.certresolver=mytlschallenge
      - traefik.http.routers.tcc-next-api.service=tcc
      - traefik.http.middlewares.tcc.headers.SSLRedirect=true
      - traefik.http.middlewares.tcc.headers.STSSeconds=315360000
      - traefik.http.middlewares.tcc.headers.browserXSSFilter=true
      - traefik.http.middlewares.tcc.headers.contentTypeNosniff=true
      - traefik.http.routers.tcc.middlewares=tcc@docker

networks:
  traefik-public:
    external: true

volumes:
  tcc-backend-data:
  tcc-geoip:
