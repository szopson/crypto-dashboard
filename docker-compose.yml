version: "3.8"

services:
  backend:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: tcc-backend
    restart: always
    env_file:
      - ./engine/.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - traefik-public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.tcc-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.tcc-api.tls=true
      - traefik.http.routers.tcc-api.entrypoints=websecure
      - traefik.http.routers.tcc-api.tls.certresolver=mytlschallenge
      - traefik.http.routers.tcc-api.priority=2
      - traefik.http.services.tcc-api.loadbalancer.server.port=8000
      - traefik.http.middlewares.tcc-api.headers.SSLRedirect=true
      - traefik.http.middlewares.tcc-api.headers.STSSeconds=315360000
      - traefik.http.middlewares.tcc-api.headers.browserXSSFilter=true
      - traefik.http.middlewares.tcc-api.headers.contentTypeNosniff=true
      - traefik.http.routers.tcc-api.middlewares=tcc-api@docker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://${DOMAIN}
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
    container_name: tcc-frontend
    restart: always
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.http.routers.tcc.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.tcc.tls=true
      - traefik.http.routers.tcc.entrypoints=websecure
      - traefik.http.routers.tcc.tls.certresolver=mytlschallenge
      - traefik.http.routers.tcc.priority=1
      - traefik.http.services.tcc.loadbalancer.server.port=3000
      - traefik.http.middlewares.tcc.headers.SSLRedirect=true
      - traefik.http.middlewares.tcc.headers.STSSeconds=315360000
      - traefik.http.middlewares.tcc.headers.browserXSSFilter=true
      - traefik.http.middlewares.tcc.headers.contentTypeNosniff=true
      - traefik.http.routers.tcc.middlewares=tcc@docker

networks:
  traefik-public:
    external: true
