name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: NEXT_PUBLIC_POSTHOG_KEY
          script: |
            cd /root/crypto-dashboard
            git pull origin main
            export NEXT_PUBLIC_POSTHOG_KEY="${NEXT_PUBLIC_POSTHOG_KEY}"
            # COINGLASS_API_KEY is provided to the frontend via env_file
            # (./engine/.env) in docker-compose.yml — no extraction needed here.
            docker compose build --no-cache
            docker compose up -d
            docker compose logs --tail 10
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
