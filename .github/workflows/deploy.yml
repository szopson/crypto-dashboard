name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: NEXT_PUBLIC_POSTHOG_KEY,COINGLASS_API_KEY,VELO_API_KEY
          script: |
            # Fail the workflow on ANY command failure. Without this, a failed
            # `docker compose build` silently deployed the previous image
            # (compose up recreated containers from the old tag) while the run
            # reported success — exactly what happened on 2026-07-08.
            set -euo pipefail
            cd /root/crypto-dashboard
            git pull origin main
            export NEXT_PUBLIC_POSTHOG_KEY="${NEXT_PUBLIC_POSTHOG_KEY}"
            # Server-side keys for the frontend cockpit / crypto-pulse route,
            # injected into the frontend container via docker-compose.yml.
            export COINGLASS_API_KEY="${COINGLASS_API_KEY}"
            export VELO_API_KEY="${VELO_API_KEY}"
            # Trade-review (frontend, server-side) needs the Anthropic key.
            # engine/.env stores it in proper KEY=VALUE form (backend loads it
            # via pydantic), so source it there; tr -d strips a stray CR.
            export ANTHROPIC_API_KEY="$(grep -E '^ANTHROPIC_API_KEY=' engine/.env | head -1 | cut -d= -f2- | tr -d '\r')"
            docker compose build --no-cache
            docker compose up -d
            docker compose logs --tail 10
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          VELO_API_KEY: ${{ secrets.VELO_API }}
