name: Deploy to VPS

on:
  push:
    branches:
      - main
    # A full --no-cache rebuild takes ~7 min — skip it for changes that
    # cannot affect the running containers.
    paths-ignore:
      - ".github/**"
      - "docs/**"
      - "**.md"
  workflow_dispatch:  # Manual trigger

# One deploy at a time; a newer push cancels the stale in-flight run
# instead of racing it on the same VPS.
concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # command_timeout caps the SSH step at 30m — this backstops the whole
    # job so a hung run fails instead of sitting out GitHub's 6h default
    # (the 2026-07-09 run had to be cancelled by hand).
    timeout-minutes: 35

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          # Full --no-cache rebuild of both images can exceed the 10m default
          # (killed the 2026-07-08 deploy at backend step 8/8).
          command_timeout: 30m
          envs: NEXT_PUBLIC_POSTHOG_KEY,COINGLASS_API_KEY,VELO_API_KEY,TELEGRAM_BOT_TOKEN,TELEGRAM_ADMIN_CHAT_ID,TELEGRAM_CHAT_ID,TELEGRAM_CHANNEL_ID,TELEGRAM_GROUP_ID
          script: |
            # Fail the workflow on ANY command failure. Without this, a failed
            # `docker compose build` silently deployed the previous image
            # (compose up recreated containers from the old tag) while the run
            # reported success — exactly what happened on 2026-07-08.
            set -euo pipefail
            cd /root/crypto-dashboard
            git pull origin main
            export NEXT_PUBLIC_POSTHOG_KEY="${NEXT_PUBLIC_POSTHOG_KEY}"
            # Server-side keys for the frontend cockpit / crypto-pulse route,
            # injected into the frontend container via docker-compose.yml.
            export COINGLASS_API_KEY="${COINGLASS_API_KEY}"
            export VELO_API_KEY="${VELO_API_KEY}"
            # Trade-review (frontend, server-side) needs the Anthropic key.
            # engine/.env stores it in proper KEY=VALUE form (backend loads it
            # via pydantic), so source it there; tr -d strips a stray CR.
            export ANTHROPIC_API_KEY="$(grep -E '^ANTHROPIC_API_KEY=' engine/.env | head -1 | cut -d= -f2- | tr -d '\r')"
            # Upsert Telegram creds from GitHub secrets into engine/.env —
            # the canonical secret store the backend reads via env_file.
            # Self-healing: the VPS copy lost these on 2026-07-08 and digest
            # drafts silently stopped delivering.
            for KV in TELEGRAM_BOT_TOKEN TELEGRAM_ADMIN_CHAT_ID TELEGRAM_CHAT_ID TELEGRAM_CHANNEL_ID TELEGRAM_GROUP_ID; do
              eval "VAL=\"\$$KV\""
              if [ -n "$VAL" ]; then
                if grep -q "^${KV}=" engine/.env; then
                  sed -i "s|^${KV}=.*|${KV}=${VAL}|" engine/.env
                else
                  printf '%s=%s\n' "$KV" "$VAL" >> engine/.env
                fi
              fi
            done
            # Reclaim disk before building: --no-cache makes the builder cache
            # useless anyway, and stale layers filled the disk on 2026-07-08
            # ("no space left on device" killed the build mid-deploy).
            # Deliberately NOT pruning volumes — tcc-backend-data holds the
            # digest/opportunity-card state.
            docker builder prune -af
            docker image prune -af
            df -h / | tail -1
            docker compose build --no-cache
            docker compose up -d
            docker compose logs --tail 10
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          VELO_API_KEY: ${{ secrets.VELO_API }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
