name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: NEXT_PUBLIC_POSTHOG_KEY
          script: |
            cd /root/crypto-dashboard
            git pull origin main
            export NEXT_PUBLIC_POSTHOG_KEY="${NEXT_PUBLIC_POSTHOG_KEY}"
            # Server-side key for the frontend cockpit / crypto-pulse route.
            # Already present on the VPS in engine/.env. Name-agnostic + CRLF-safe:
            # match any line mentioning coinglass (COINGLASS_API_KEY=, "coinglass - ",
            # "coinglass:", etc.) and pull out the 32-char hex token.
            export COINGLASS_API_KEY="$(grep -iE 'coinglass' engine/.env | grep -oiE '[a-f0-9]{32}' | head -1)"
            docker compose build --no-cache
            docker compose up -d
            docker compose logs --tail 10
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
